<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fedi-Xanadu</title>
  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
  <script>
    (function(){var t=localStorage.getItem('theme');if(t==='dark'||(t===null&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark');})();
  </script>
  <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
